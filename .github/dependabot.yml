version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /labs/cache-locality-lab
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      cargo-patch-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /labs/cache-locality-lab
    schedule:
      interval: weekly
    commit-message:
      prefix: docker
    labels:
      - dependencies
      - docker
    open-pull-requests-limit: 3
    groups:
      docker-base:
        patterns:
          - "*"
