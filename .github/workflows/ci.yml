name: Repository CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace_docs_integrity:
    name: workspace-docs-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate repository markdown and links
        run: python ./scripts/validate_repo.py

  cache_locality_rust_ci_linux:
    name: cache-locality-rust-ci-linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: labs/cache-locality-lab
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            labs/cache-locality-lab/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('labs/cache-locality-lab/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

      - name: Compile benchmark targets
        run: cargo bench --bench cache_locality --no-run

  cache_locality_rust_ci_windows:
    name: cache-locality-rust-ci-windows
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: labs/cache-locality-lab
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run tests
        run: cargo test --all-targets

      - name: Compile benchmark targets
        run: cargo bench --bench cache_locality --no-run
