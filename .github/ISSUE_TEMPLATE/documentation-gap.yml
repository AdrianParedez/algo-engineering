name: Documentation gap
description: Report missing, unclear, stale, or contradictory documentation.
title: "[docs] "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Location
      description: File or section that needs work.
      placeholder: 03-performance-engineering/06-profiling-and-benchmarking.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain what is missing or wrong.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed correction
      description: Include source links if you have them.
    validations:
      required: false
